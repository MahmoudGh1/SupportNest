<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>SupportNest Widget Test</title>
		<style>
			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
				margin: 0;
				padding: 40px;
				background: #f9fafb;
				color: #111827;
			}
			h1 {
				font-size: 24px;
				margin-bottom: 8px;
			}
			p {
				color: #6b7280;
			}
		</style>
	</head>
	<body>
		<h1>My Test Store</h1>
		<p>Chat widget should appear bottom-right.</p>
		<script
			src="[The Business Client]/widget.js"
			id="widgetScript"
			data-base-url="[SupportNest Server]"
			defer
		></script>
		<script>
			document.addEventListener("DOMContentLoaded", () => {
				console.log(window);
				fetch("[The Business Server]/api/generate-widget-token")
					.then((res) => res.json())
					.then((data) => {
						window.SupportNest.init({
							widgetKey: "[your unique widget key]",
							customerToken: data.token ?? null,
						});
					});
			});
		</script>
	</body>
</html>
